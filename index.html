<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Register</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #9bbcd1;
}

.navbar {
    background: #e7c089;
    padding: 10px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.navbar input[type="text"] {
    width: 300px;
    padding: 5px;
}

.nav-links a {
    margin-left: 20px;
    text-decoration: none;
    color: black;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 90vh;
}

.card {
    background: #f1f1f1;
    padding: 30px;
    width: 450px;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.card h2 {
    text-align: center;
}

input {
    width: 100%;
    padding: 8px;
    margin: 8px 0 15px 0;
    border-radius: 4px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    background: #f4b400;
    border: 2px solid black;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="navbar">
    <div>Logotype</div>
    <div>
        <select>
            <option>Almaty</option>
        </select>
        <input type="text" placeholder="Search...">
    </div>
    <div class="nav-links">
        <a href="#">Products</a>
        <a href="#">Log in</a>
        <a href="#">Register</a>
    </div>
</div>

<div class="container">
    <div class="card">
        <h2>Register</h2>
        <label>Full Name</label>
        <input type="text" placeholder="John Doe">

        <label>Email</label>
        <input type="email" placeholder="example@email.com">

        <label>Phone</label>
        <input type="tel" placeholder="123-456-7890">

        <label>Password</label>
        <input type="password">

        <label>Confirm Password</label>
        <input type="password">

        <button>Register</button>
    </div>
</div>

</body>
</html>
